name: GH-Actions
on:
  push:
    branches:
      - "**"
  pull_request:
    branches:
      - "**"

jobs:
  php_service_build:
    runs-on: cronos
    container:
      image: php:8.2-cli
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          clean: true
      - name: Install system deps
        run: |
          apt-get update && apt-get install -y --no-install-recommends git unzip libzip-dev
          docker-php-ext-install zip
      - name: Install Composer
        run: |
          php -r "copy('https://getcomposer.org/installer', 'composer-setup.php');"
          php composer-setup.php --install-dir=/usr/local/bin --filename=composer
          php -r "unlink('composer-setup.php');"
      - name: PHP Version
        run: php --version
      - name: Composer Version
        run: composer --version
      - name: Install Dependencies
        run: composer install --no-interaction
      - name: Run Tests
        run: php vendor/bin/phpunit --coverage-clover coverage.xml || true
      - name: Run Static Analysis
        run: php vendor/bin/phpstan analyse --no-progress || true
      - name: Check Code Style
        run: php vendor/bin/php-cs-fixer fix --dry-run --diff || true
